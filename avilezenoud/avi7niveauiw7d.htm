<script language="JavaScript1.2">

var message="..........Maar, zou Flora wel op tijd alle dieren weten te bevrijden? Want de gemene jager was net van huis vertrokken om de buit op te halen! ‘Er  zitten nog 3 dieren vast,’ schreeuwde de postduif, die alvast vooruit gevlogen was. Snel gingen ze verder. Ze kwamen bij Pluim, de eekhoorn. Ook hij werd snel bevrijd en zijn pootje werd genezen. De jager is al bij het bos Flora! Dat zei de grote wijze uil die inmiddels op de uitkijk was gaan zitten. Oh jee, er zitten er nog 2 vast! Snel gingen ze verder. De volgende, een klein vosje, werd bevrijd en toen gingen ze haastig op weg, op zoek naar het laatste dier dat nog vast zat. Het dier zat in de verste klem die de jager had uitgezet. Hopelijk waren ze op tijd en was de jager er nog niet! Toen ze vlakbij kwamen hoorden ze een eend zielig kwaken. Vlug, we zijn nog op tijd, zei Flora. In de klem zat Eduard de eend uit de vijver.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=170  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
