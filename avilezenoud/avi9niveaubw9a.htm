<script language="JavaScript1.2">

var message="..........De zee was oneindig groot en stil. Het was erg eenzaam want er was geen schip te zien. Krachtige oceaangolven spoelden sloom naar een verre kust en de zonnestralen sprankelden als diamanten op de zee. Ergens in die diepblauwe vlakte dobberde een klein flesje. In het flesje zat een heel klein stokje. Het leek op een gewoon stokje. Maar vreemd genoeg, scheen het stokje te bewegen en groeide zijn hoofd in een puntje iedere keer als de fles op en neer ging. Het flesje was al vele dagen en nachten met de stroming mee gedreven. Toen, op een diep donkere nacht, kwam er een enorme storm. De harde wind sloeg de golven kletterend terug in zee. De golven gooiden het flesje heen en weer, en het stokje trilde en beefde. De storm was woedend en kende geen genade voor de fles. Na een tijdje, maakte een sterke bries een hele grote golf die het flesje op een strand gooide.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=103  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()
