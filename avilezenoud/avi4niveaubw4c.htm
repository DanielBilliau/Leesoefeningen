<script language="JavaScript1.2">

var message="............... Tuur poetst zijn laarzen tot ze glimmen. Met een lap wrijft hij zijn ridderhelm op. Op de helm maakt hij een gele veer vast. Tuur denkt aan het toernooi. Dat is een wedstrijd voor ridders. Tuur voelt zijn hart kloppen in zijn keel. Want hij doet mee aan het toernooi. Voor de eerste keer dan nog wel. Met knikkende knieën loopt hij naar de stal. Daar staat Ros, zijn paard. Het is zo ver, murmelt Tuur. Je moet er mooi uitzien, Ros. Tuur borstelt zijn paard tot zijn vacht glanst. Voorzichtig kamt hij alle knopen uit de manen. Dan vlecht Tuur de staart van Ros. Hij legt een gele lap met franjes over zijn rug. Ros en zijn baas zien er prachtig uit. Tuur hoort de klokken luiden. We moeten gaan, zegt hij. Hij bindt zijn boog op zijn rug.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=165  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
