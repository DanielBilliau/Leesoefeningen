<script language="JavaScript1.2">

var message="............... Nel heeft een fototoestel. Het is haar eigendom. Ze kan er echte foto's mee maken. Ze kreeg het van die lieve oom. De oom uit Amerika! Kijk, ze gaat een foto maken. Een foto van Dirk. Maak je mooi, zegt ze, en doe je beste pak aan. Het moet een prachtig kiekje worden! Maar Dirk is al weg. Hij is nu op zijn kamer. Dirk wast zijn gezicht. Hij poetst ook zijn tanden. Hij kamt zijn haar. Op zijn haar doet hij wat vet. Dat mag van moeder. Met wat vet glanst je haar zo mooi. Het ruikt ook lekker! Dirk doet zijn zondagse pak aan. Ja, hij draagt zelfs zijn mooie, rode strik. Wat is Dirk netjes! Het wordt vast een prachtige foto! Nel en Dirk gaan naar de tuin. Moeder gaat ook mee. Dirk moet voor een rozenstruik staan.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=265  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
