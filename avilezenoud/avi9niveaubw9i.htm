<script language="JavaScript1.2">

var message="..........De zeven dwergen gingen naar hun werk en zeiden dat ze voor niemand open moest doen. In haar kasteel bleef de boze koningin haar toverspiegel vragen: Spiegeltje aan de wand, wie is de mooiste in dit land? O koningin, de schoonste hier ben jij, maar Sneeuwwitje over de bergen, bij de zeven dwergen, is nog duizend maal schoner dan jij. Toen verkleedde koningin zich als een lelijke oude vrouw en vertrok naar het bos, waar ze zonder moeite het huisje van de zeven dwergen vond. Daar klopte ze op het luik en gaf Sneeuwwitje de mooiste appel uit haar mand. Sneeuwwitje nam een hap en viel als dood neer! Bij hun terugkomst vonden de zeven dwergen Sneeuwwitje languit op de grond. Ze probeerden haar weer tot leven te wekken, maar ze was echt dood. Omdat ze zo mooi was maakten de dwergen een glazen kist voor haar zodat ze haar altijd konden bewonderen.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=103  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
