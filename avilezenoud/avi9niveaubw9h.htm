<script language="JavaScript1.2">

var message="..........Er was eens een prins die zo graag een prinses wilde hebben, maar het moest een echte prinses zijn. Toen reisde hij de wereld rond om er een te vinden, maar overal kwam er iets tussen. Prinsessen waren er genoeg, maar of het echte prinsessen waren, daar kon hij nooit helemaal achter komen, altijd was er iets dat niet helemaal in de haak was. Toen kwam hij weer thuis en was erg bedroefd, want hij wilde graag een heuse prinses hebben. Op een avond brak er een verschrikkelijk onweer los; het bliksemde en donderde, de regen stroomde neer: het was vreselijk! Toen werd er aan de stadspoort geklopt en de oude koning ging opendoen. Het was een prinses die buiten stond. Wat zag ze eruit door de regen en het noodweer! Het water liep uit haar kleren en haren, bij de punt van haar schoen liep het erin en bij de hiel er weer uit. Ze zei dat ze een echte prinses was.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=103  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
