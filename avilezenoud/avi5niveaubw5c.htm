var message=".......Katinka wil zonder zijwieltjes fietsen. Dat is te moeilijk! zegt papa. Niet! roept Katinka. Andere kinderen kunnen het ook! Maar die zijn al groot. Ik ben ook groot! Katinka strekt haar armen boven haar hoofd. Goed dan. Papa haalt het zijwieltje eraf. Katinka gaat op haar fiets zitten. Maar de fiets valt om. Het is echt moeilijk hoor! Katinka gaat weer op haar fiets zitten en papa houdt haar vast. Katinka fietst heel hard. En papa probeert mee te rennen. Even stoppen! hijgt papa. Maar Katinka wil nog een keer. Vooruit. Papa rent weer met Katinka mee. En dan laat hij haar los. Katinka merkt het niet eens. Je kan het! Katinka schrikt. Haar fiets slingert. Ze rijdt bijna tegen de stoep aan. Katinka sleept met haar schoenen over de grond. En dan staat ze stil. Katinka wil het nog een keer proberen. Ze fietst helemaal alleen naar het eind van de weg.";//hiervoor je tekst

}
else

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()
