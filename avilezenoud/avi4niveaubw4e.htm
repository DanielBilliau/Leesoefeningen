<script language="JavaScript1.2">

var message="............... Goes de draak spuwt de hele tijd vuur. Zijn neus is zo heet als een oven. Op zijn rode neus bakt hij taarten. Stapels taarten voor alle mensen die naar het feest komen. Goes is een schat van een draak. Iedereen is dol op zijn taarten. Goes zijn taarten smaken heerlijk. Ook de draak denkt aan Tuur. Tuur is zijn beste vriend. Ik ga voor je duimen murmelt Goes. Hij heeft een spandoek voor zijn vriend gemaakt. Voor Tuur ga ik door het vuur, staat erop. Goes stopt even met vuur spuwen. Hij spitst zijn oren. Hoort hij het goed? Ja, de klokken luiden. Ik moet ervandoor, mompelt hij. Alle taarten stapelt Goes op een kar. Hij rolt het spandoek op en klemt het onder een poot. De kar duwt hij voor zich uit. Goes loopt naar het dorp.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=165  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()
