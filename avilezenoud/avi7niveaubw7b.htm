<script language="JavaScript1.2">

var message="..........Er was eens een jongen die heette Jelle en zijn vriendje heette Jordi. Jelle en Jordi waren de beste vrienden. Alleen één probleem. Ze zaten allebei op een andere school. Jelle op de Doordenker en Jordi op een school voor speciaal onderwijs . Verder waren ze de beste maatjes. De twee scholen stonden wel allebei in dezelfde plaats. Ook waren de twee vrienden buren van elkaar. Elke schooldag ging Jelle naar de Plusser en wachtte daar op Jordi. Jordi's school was een half uur later uit. Maar de twee scholen lagen een flinke afstand uit elkaar. Dus die tijd had Jelle ook wel nodig om naar de Plusser te gaan. Het was namelijk een aardig eindje. Maar nou weet je nog niets van dat wonderlijke avontuur. Jelle zat in de klas te luisteren naar het verhaal dat de juf voorlas. Weer zo'n mooi boek van Carry Slee.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=103  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()
