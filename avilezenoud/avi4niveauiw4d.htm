<script language="JavaScript1.2">

var message="............... Piet denkt: Een flinke draak spuugt geen vuur, als de anderen om hem lachen. Er komt een wolkje rook uit zijn neus. Hij snuift het snel naar binnen. De meester kijkt Piet streng aan. Als je mij niet gelooft, dan zul je de reus zelf moeten zoeken. Dat staat in de boeken. Ik heb hem nooit gezien. Ik ben bang. Wie niet bang is, moet hem zien. Dat heb ik gelezen. Meester brengt Piet naar buiten. Hij zegt: Ga maar gauw en goede reis. De hele klas zwaait. Piet is bang. Hij denkt: ik ga de reus niet zoeken. Ik wil naar huis. Meester roept: En niet naar huis gaan he! Piet schrikt. Zijn vleugels slaan wild in het rond. Het vuur barst haast uit zijn borst. Er glipt een vonk tussen zijn lippen uit. Piet kijkt bang om zich heen.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=265  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
