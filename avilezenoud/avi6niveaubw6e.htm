<script language="JavaScript1.2">

var message="..........De kermis was voorbij. Oom Jan en zijn knechten, tante Nie en haar meid moesten weer werken op de boerderij. Rik reed op de kar naar het veld. Dat schokte wel wat, maar hij viel toch niet. Zus mocht de kippen voeren. De kippen kwamen van alle kanten. Zij pikten vlug het graan op. Toen ging zus naar het kippenhok en zij vond een vers ei. Dat eitje kookte tante en het smaakte lekker. Ik woon liever buiten, zei zus. Ja Jet, maar wij gaan toch weer naar de stad. Rik zou ook liever bij oom blijven. Hij wilde later zeker boer worden en zus boerin. Pa en ma kregen hun kinderen niet gemakkelijk mee. Eindelijk zaten ze allen weer in de trein. Het was donker, toen pa en ma met hun twee kinderen in de stad aankwamen. Jet had slaap. Zij was nog klein en dat reizen maakte haar moe.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=103  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
