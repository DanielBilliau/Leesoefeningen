<script language="JavaScript1.2">

var message=".......Oom komt op bezoek. Oom uit Amerika! Het is vaders broer. Nel en Dirk hebben hem nog nooit gezien. Ze kennen hem van de foto's, die hij stuurt. Daar is oom! Hij geeft moeder een hartelijke kus. En vader krijgt een warme handdruk. Hallo, kinderen, roept oom, ik heb wat mee hoor! Nel vliegt oom om zijn hals. En ze zoent en zoent die lieve oom. Dirk vindt al dat zoenen maar flauw. Een jongen doet zoiets niet, denkt hij.Hij wil oom een hand geven, net als vader. Ben je te groot om mij een kus te geven, vraagt oom. En oom neemt Dirk in zijn armen. Hij geeft hem drie klinkende zoenen. Dirk bloost als een kriek. Nu maakt oom het pak open. Je raadt nooit wat er in zit! Een fototoestel voor Nel! Je kunt er echte foto’s mee maken. Wat komt er uit het pak voor Dirk? Een speelgoed dokterstas. In die tas zitten vreemde dingen. Dingen die dokters echt gebruiken.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=123  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()
