<script language="JavaScript1.2">

var message="..........In het mooie bos waar Flora de Fee woont is het voorjaar geworden. Alles staat in bloei en de bomen zitten weer vol met bladeren.  Er worden ook weer volop jonge dieren geboren. Zo zijn er vogeltjes, haasjes, konijntjes, hertjes, vosjes, eekhoorns en de vijver zit boordevol kikkerdril. Terwijl Flora van dit alles zit te genieten gebeurt er in het bos iets vreselijks. Er loopt een man rond met donkergroene kleren aan en een pet op. Over zijn schouder hangt een raar, langwerpig ding. Dat rare ding is een geweer en die man is een jager! Een jager die dieren dood maakt! De jager zet allemaal klemmen in het bos en bedekt ze met bladeren. Daarna gaat hij  weer naar huis. De nietsvermoedende dieren in het bos gaan verder met hun dagelijkse bezigheden. Plotseling schalmt er een angstige kreet.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=103  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()
