<script language="JavaScript1.2">

var message="............... Rein zit voor zijn hol. Wat is het hier toch saai vandaag, zucht hij. Maar daar ziet hij de beer. Wat ruik ik hier? zegt de beer. Jam! Mooi zo. Ik zoek die jam en dan is die voor mij! De beer loopt tot bij rein en zegt: dag rein, hoe gaat het met je? Heel goed, zegt de vos. Het is mooi weer en het waait niet te hard. Maar wat doe jij hier? Ik wandel zo maar wat rond, liegt de beer. Maar de vos weet wel wat de beer zoekt. Hij ruikt vast de pot met jam. Wel beer, wil je wat jam? Ik weet wel dat jij dat lust, zegt de vos. Waar haal je die jam, rein? Doe je poot heel diep in dat gat in die boom daar.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=200  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
