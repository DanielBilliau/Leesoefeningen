<script language="JavaScript1.2">

var message="..........Intussen was het winter geworden. Bibberend van de kou zwierf het meisje tot zij uiteindelijk bij een korenveld kwam. Daar werd zij gevonden door een veldmuis die haar meenam naar haar holletje. Ze mocht bij de muis blijven en al spoedig raakte zij gewend aan haar omgeving. Op een dag vond zij een zwaluw, die doordat hij gewond was geraakt, niet met zijn familie naar het zuiden had kunnen vliegen toen de winter kwam. Duimelijntje verzorgde de vogel tot hij weer helemaal genezen was. Intussen had zij ook kennis gemaakt met de andere dieren in het korenveld. De buurman van de muis was een dikke, zwarte mol. Hij kwam zelden boven de grond, maar in zijn hol bewaarde hij enorme voorraden voedsel, waarvan hij echter nooit iets weggaf. Behalve gierig was de mol ook nogal bazig en wilde altijd zijn zin hebben. Deze mol wilde met haar trouwen.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=103  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
