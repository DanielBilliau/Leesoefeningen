<script language="JavaScript1.2">

var message="..........Een paar dagen later komen de pieten aan en gaan ze hun luxe tentenkamp opzetten. Er lopen opvallend veel dieren rond. Allemaal hebben ze het nieuws gehoord en ze zijn dan ook nieuwsgierig naar de zwarte pieten! Flora is ook nieuwsgierig en elke dag gaat ze even kijken. Dan gaat ze hoog in een boom op een tak zitten, zodat ze de zwarte pieten niet stoort met hun werkzaamheden. Ze zijn erg druk. Cadeaus inpakken in jute zakken, pepernoten, speculaas en borstplaat bakken, chocoladeletters en marsepein maken. Ook Americo, het paard van Sinterklaas heeft zijn stal in het kamp en hij moet er ook verzorgd worden. Ook moeten jonge pieten in het pietenkamp oefenen om goed te leren klimmen op de daken en om cadeaus in de schoorstenen te gooien. Ook leren ze met pepernoten gooien. Ze mogen pas met Sinterklaas mee als ze een heus Pietendiploma hebben!’ ";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=170  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
