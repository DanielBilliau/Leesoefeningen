<script language="JavaScript1.2">

var message=".......In de lucht waaide Jan de Wind. De storm was zijn vriend. Jan had nog een vriend. Dat was de molenaar. Hij keek vaak naar de lucht en riep: Hallo, Jan! Waai jij maar. Samen malen we de korrels tot meel. Dan kan de bakker weer lekker brood gaan bakken. De molenaar was ook al oud, maar zeker niet zo oud als de molen. Zijn baard en haren waren grijs. Hij was te oud om te werken. Maar dat gaf niets, want hij had drie grote zonen. Die zonen waren flink en sterk. De oudste noemde Bram. Piet was de tweede. De derde heette Klaas. De jongens deden altijd samen al het werk. De molenaar had ook een grijze ezel. Die bracht grote, zware zakken met graan aan. Daarna droeg hij het meel weer weg. In de molen liep een poes. Een kater om de muizen te vangen. Dat hoorde erbij. Alles ging goed op de molen. Ieder had het naar zijn zin. Zo gingen vele jaren voorbij.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=123  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
