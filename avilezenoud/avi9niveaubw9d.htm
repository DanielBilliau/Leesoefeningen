<script language="JavaScript1.2">

var message="..........Het is half januari en de sneeuw die de afgelopen weken is gevallen in het grote bos begint langzaam te smelten, terwijl het zonnetje voorzichtig een paar van haar zwakke zonnestraaltjes op het bos loslaat. Flora zit op één van de kale takken in de boom ademloos van dit mooie winterse tafereeltje te genieten. Flora denkt na over de afgelopen weken. Het is uiteindelijk toch nog een heerlijke kerst geworden en er zijn geen vervelende dingen gebeurd met de jaarwisseling Nu zijn we weer met een nieuw jaar begonnen. Tot nu toe is er nog niets naars gebeurd in het grote bos. Terwijl Flora dit alles zat te overpeinzen gebeurde er verderop in het bos wel degelijk iets naars! Er liepen twee jagers door het bos, op zoek naar een prooi! Kijk,daarginds staat een mooie hinde! De jager richtte de loop van zijn geweer op de mooie hinde en schoot.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=103  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
