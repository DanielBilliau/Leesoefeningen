<script language="JavaScript1.2">

var message="..........Er was eens een weduwe, die twee dochters had. De één, Rita, was mooi en ijverig, de andere, Mina, lelijk en lui. Maar ze hield van de lelijke en luie, die haar eigen dochter was, veel meer, en de andere moest alle werk doen het huishouden doen zijn. 't Arme meisje moest elke dag op straat zitten bij de waterput en ze moest zoveel spinnen. Hoeveel ze spinde maakt eigenlijk niet uit, want het was altijd te weinig. Door het vele spinnen gebeurde het dat het bloed haar uit de vingers sprong. Nu gebeurde het eens, dat de spoel helemaal bloederig was. Toen bukte ze zich over de putrand en wilde de spoel even afwassen, maar de spoel sprong haar uit de hand en viel naar beneden. Zij wist dat haar stiefmoeder heel boos zal worden als ze zonder spoel terug zal komen. Daarom besloot ze ook maar in de put te springen om de spoel te gaan halen.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=170  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
