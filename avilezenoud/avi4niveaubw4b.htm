<script language="JavaScript1.2">

var message="............... Dirk heeft een dokterstas. Die kreeg hij van zijn oom uit Amerika! Die tas is echter maar speelgoed! Ik ben de dokter, zegt Dirk, jij moet ziek zijn, Nel. Fijn, zegt Nel, dan hoef ik niets te doen. Ik ga lekker op de bank liggen, dokter. Dirk haalt een rood kleurpotlood. Ik maak wat rode stipjes op je gezicht,zegt hij, dan lijkt het of je echt ziek bent. O! O! Wat ziet Nel er uit. Het lijkt wel of ze mazelen heeft! Daar is moeder. Ze schrikt als ze Nel ziet. Ze schrikt van al die rode stipjes. Wat hebben Dirk en Nel pret. Ze hebben moeder beet gehad! Dat was een goede grap! En moeder is niet kwaad, hoor! Neen, ze moet hartelijk lachen. Kleine deugnieten, zegt ze. Het is tijd om te eten. Die rode stipjes moeten er af.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=165  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()
