<script language="JavaScript1.2">

var message="..........Het hert zat er natuurlijk helemaal niet op te wachten om gedood te worden en probeerde dan ook om te vluchten, zo goed en zo kwaad als dat ging met zijn gewonde poot. Hij kwam tot bij een dichte struik en ging daar middenin liggen, plat op de grond. Hier konden die lelijke jagers hem niet zien. De jagers zochten en zochten en toen het donker begon te worden gaven ze het maar op. Ze sjokten moedeloos en chagrijnig naar huis, waar moeder de vrouw op hen zat te wachten met een pan vol met heerlijke boerenkool. Maar, in de struiken lag nog steeds het gewonde hert. Hij verloor veel bloed en werd steeds zwakker en zwakker. Niet doodgaan!, dacht het musje dat alles vanuit een hoge boom had gezien. Ik kan hem niet helpen! Maar wacht eens, ik ga hulp halen! Ik moet Flora zien te vinden. De mus vloog weg om Flora de Fee te gaan zoeken.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=103  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
