<script language="JavaScript1.2">

var message="............... Bas en Kas helpen de prins. Wil je een kop melk of een kop koffie, prins? Als het kan, een kop melk, Bas. De koning slaapt al een week lang. Hij kan maar niet wakker worden. Kunnen jullie me helpen, Bas en Kas? Prins Pluis, Bas en Kas praten nog lang. Komen jullie vandaag nog? vraagt de prins. Dat is  beloofd, zeggen Bas en Kas. Koning Pluis ligt in een mooi bed. Wat doen jullie om de koning te wekken? Eerst zingen we luid en slaan op de gong. Dan gieten we water over het hoofd van de koning. Als dat allemaal niet helpt nemen we een veer van de eend. Bas kietelt de koning onder de neus. De koning niest en is wakker. Wie plaagt me?";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=306  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
