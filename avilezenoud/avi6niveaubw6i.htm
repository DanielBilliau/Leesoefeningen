<script language="JavaScript1.2">

var message="..........Rond het kasteel groeide een doornenhaag, die zo hoog werd dat het kasteel niet meer te zien was. Iedereen in het land kende het verhaal van de mooie slapende Doornroosje. Vaak kwamen er prinsen die het kasteel wilden binnendringen. Maar dan greep de doornenhaag hen vast en konden ze niet meer loskomen. Ze stierven jammerlijk. Op een dag kwam er weer een prins naar het kasteel. Net op die dag waren de honderd jaar verstreken. De haag bloeide met prachtige bloemen en opende zich toen de prins er aankwam. Achter zijn rug vormde zich weer een dichte doornenhaag. De prins liep door het kasteel waar alles nog stilstond. Op de vergeten zolder vond hij Doornroosje. Hij gaf haar een kus. Doornroosje deed haar ogen open en kon ze al meteen niet geloven. Wat een prachtige prins zag ze daar.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=103  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
