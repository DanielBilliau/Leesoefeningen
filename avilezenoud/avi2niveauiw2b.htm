<script language="JavaScript1.2">

var message="............... De vos en de haas. Op een dag loopt Rein door het bos. Zijn buik is leeg. Hij is nu dicht bij het huis van pa en ma haas. Wat ruikt hij daar? Hij loopt er gauw naar toe, maar wel heel zacht. Hij loert door het raam. Hij ziet pa haas, maar ma haas is er niet bij. Pa haas kookt vis in een pot op het vuur. Hij maakt ook een saus. Die ziet er goed uit! Er is ook kool. Ze komt van het veld en is nog rauw. Dan ziet Rein ook taart. De vos ziet hoe de haas kauwt op wat kool. Na de kool eet de haas een stuk taart.Het sap komt in de muil van de vos. Wat heeft hij zin in die taart en in die vis! Maar hoe komt hij daar nu aan?";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=310  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
