<script language="JavaScript1.2">

var message="..........Mag ik dan onder de douche met de paraplu? Nee, dat mag niet, zegt mama. Een paraplu is voor buiten. Dan gaan wij buiten staan en dan gooi jij een emmer water over ons hoofd! Nee, het mag niet. Wat moeten we dan doen? Jullie mogen buiten spelen. Het is heel lekker weer. Katinka en Boris gaan kladderen met zand en water. Oma en mama gaan ook buiten zitten. Mama zet een parasol in de tuin en gaat er met oma onder zitten. Waarom heb jij wel een paraplu? Dat is een parasol. Dat is tegen de zon.  Oma fluistert iets in mama’s oor. Mama knikt. Ze gaat naar binnen en komt terug met twee mooie parasols. Een oranje en een blauwe. Van oma gekregen. Katinka en Boris gaan onder hun parasolletjes zitten. Als mama even niet kijkt, gooit oma een bakje water over de parasolletjes. Straaltjes water stromen naar beneden, maar ze worden niet nat!";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=170  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()
