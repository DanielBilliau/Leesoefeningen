<script language="JavaScript1.2">

var message="............... Loes wordt wakker van lawaai op straat. Is dat de vuilnisman al? Hoe kan dat nou? Die komt toch pas om negen uur. Loom wrijft ze de slaap uit haar ogen. Ze kijkt op de wekker en schrikt. Tien voor negen? Dan had ze allang weg moeten zijn! Waarom heeft mam haar niet geroepen? Haastig springt ze uit bed. Au! roept Din. Kun je niet een beetje uitkijken? Je stampt me precies in de maag. Maar Loes trekt zich niets van hem aan. Ach natuurlijk: mam is niet thuis. Die gaat 's maandags altijd naar haar gymclub. Snel graait ze haar kleren van de stoel. Waarom heb je zo'n haast? wil Din weten. Omdat ik naar school moet, snauwt Loes. Ik ben veel te laat. Din grijnst maar hij zegt niets. Hij ziet Loes naar buiten rennen.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=165  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()
