<script language="JavaScript1.2">

var message="..........Voor ik je ga vertellen wat Petunia te zeggen had, moet je eerst weten dat Petunia ver weg woont in het land van de koningin. Daar werkt ze in het mooie, grote paleis. Ze is de belangrijkste verzorgster van de koningin. Ze helpt haar met aankleden, haren kappen, make-up opdoen. Ze zorgt dat de koningin nieuwe kleren krijgt, dat er elke avond een heerlijk geurend bad voor haar klaarstaat en dat ze de heerlijkste gerechten te eten krijgt. Maar de laatste tijd wil de koningin geen mooie kleren meer, geen bad, geen mooie haren, geen make-up en geen eten. De koningin is lusteloos. Ze is de vrolijkheid kwijt die ze altijd had en waar ze om bekend stond! Ze zit de hele dag maar in bed. Geen televisie, geen radio. Ze wil het bed niet uit. Ze zit in de kussens en staart voor zich uit. De clown is geweest, maar de koningin kan niet lachen.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=170  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
