<script language="JavaScript1.2">

var message="..........Sinds die tijd kon de kleine zeemeermin nergens anders meer aan denken. Omdat de prins een mens was ging de kleine zeemeermin naar de zeeheks. Deze woonde in een huis dat gebouwd was van oude scheepswrakken en werd bewaakt door zeedraken. De zeeheks gaf haar een toverdrank. Als je deze toverdrank drinkt krijg je twee benen, maar elke stap zal zijn als of je op glasscherven loopt. Maar als de prins niet met je trouwt dan zal je in zeeschuim veranderen. In ruil hiervoor wil ik je stem, zei de heks. De kleine zeemeermin ging snel naar het strand waar zij de prins had neergelegd, ze dronk de drank en verloor meteen haar stem en viel flauw. Toen ze weer haar ogen opende stond de prins voor haar en vroeg wie ze was. Maar ze kon geen antwoord geven. De prins nam haar mee naar haar kasteel.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=170  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
