<script language="JavaScript1.2">

var message="..........Mama kookt witte eieren. Een hele pan vol. Gaan we die allemaal opeten? vraagt Katinka verbaasd. We gaan ze verven. En morgen, als het pasen is, eten we ze op. Katinka en Boris krijgen allebei een oud hemd aan. Dan is het niet erg als ze vies worden. Mama pakt verf, kwastjes en een glaasje water. Ze doet het voor: eerst het kwastje in het water, dan in de verf en dan op het ei. En dan mogen Katinka en Boris het zelf doen. Katinka doet het precies zoals mama voorgedaan heeft. Ze maakt haar ei eerst helemaal geel. En dan verft ze er blauwe stippeltjes op. Het wordt erg mooi. Boris roert wild met zijn kwastje in het water en in de verf. Mama helpt Boris een beetje. Poes Brannie komt ook kijken. Ze springt op de tafel en snuffelt aan de verf. Brannie gaat aan de verf likken!";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=170  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
