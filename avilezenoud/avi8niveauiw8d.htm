<script language="JavaScript1.2">

var message="..........Oh nee, de jongens gingen fikkie stoken! Dat was nu heel gevaarlijk, want door dat warme weer was alles in het bos zo droog geworden, dat een klein vonkje al een bosbrand zou kunnen veroorzaken! Ja hoor, de eerste jongen streek en lucifer langs het doosje die meteen vlam vatte. Hij hield de lucifer bij de stapel takken en.. WOESH. De stapel begon onmiddellijk te branden. Er steeg een scherpe rook op vanaf het vuurtje, met daarin een paar gloeiende vonken… Één van die vonken viel op een berg bladeren. Nog een keer WOESH en ook die berg vatte vlam. De boom die ernaast stond, begon ook al wat te branden. De jongens hadden het zien gebeuren en schrokken enorm. Zo hadden ze het niet bedoeld! Van pure angst renden de jongens weg, het bos uit. Een stuk verder, bij de beek, lagen Flora en de dieren elkaar vrolijk nat te spatten.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=170  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
