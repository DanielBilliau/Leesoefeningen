<script language="JavaScript1.2">

var message=".......Dit verhaal verklaart waarom de bever nu een platte staart heeft. Bever en Stekelvarken waren dikke vrienden. Op een dag nodigde Bever zijn vriend Stekel uit om met hem mee te gaan naar zijn zomerverblijf op een eiland in een groot meer. Stekel kon niet zwemmen. Dus bood Bever aan hem over het water te dragen. Hij klom op de rug van Bever, die met hem naar de overzijde zwom. De vrienden zaten samen op het zomerverblijf op het eiland. Zij speelden er maar op los. Op het einde van de dag viel Stekel in slaap, Bever liet hem achter en zwom naar huis. Toen het bijna donker was werd Stekel wakker. Hij was erg bedroefd toen hij merkte dat zijn vriend hem in de steek gelaten had, en hij huilde. ‘s Nachts zat hij droevig voor zich uit te staren naar de andere kant van het meer en hij begon te zingen. He was ik maar wijs. He kwam er maar ijs.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=190  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
