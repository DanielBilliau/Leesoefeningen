<script language="JavaScript1.2">

var message="............... Tim loopt naar school. Met een boterham in zijn hand. Zonder Snotje. Hij tikt weer elke voordeur aan. Zou Paul het al gemerkt hebben? denkt Tim. Tim slentert nog slomer. Bah, die boterham. Ik bewaar hem wel voor op school. Tim zet de tas neer en bukt zich. Blijf zo maar staan kereltje, hoort hij. Voor hem staan twee sportschoenen. Een hand grijpt in zijn nek. Strik je schoenen aan elkaar, Kereltje. Dat kun jij toch zo goed. Tim duwt de hand weg. Kwaad komt hij overeind. Paul staat grijnzend voor hem. Hij heeft Snotje in zijn hand. Geef hier! zegt Tim. Hij grijpt naar Snotje. Paul doet een stap achteruit. Hij houdt Snotje achter zijn rug. Eerst je schoentjes strikken, Kereltje. Paul zwaait Snotje in het rond.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=265  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
