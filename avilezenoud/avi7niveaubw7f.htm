<script language="JavaScript1.2">

var message="..........Mormeltje en Dondertje zitten onder de appelboom naast hun huisje. Ze eten pannenkoeken met stroop, met jam, met suiker en met appelschijfjes. Mormeltje legt een grote pannenkoek op haar bordje, maar als zij er stroop op wil doen, is haar bordje leeg. Help! Mijn pannenkoek is weg. Malle Mormeltje, lacht Dondertje. Je hebt hem natuurlijk opgegeten. Nee, echt niet. Hij lag op mijn bordje en nu is ie weg. Mormeltje kijkt onder haar bord. Onder de strooppot. Onder de jampot. Onder het tafelkleed. De pannenkoek is nergens te vinden. Hoe kan dat nou? Een pannenkoek heeft toch geen pootjes? D-d-daar, stottert Mormeltje. Een hand! Er steekt een hand uit de boom. Die hand pakt nu jouw pannenkoek. Mormeltje heeft gelijk. Tussen de takken van de boom door is een harige, bruine hand gekomen en ook weer verdwenen. Verdwenen met de pannenkoek van Dondertje. Wat wordt Dondertje boos.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=103  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
