<script language="JavaScript1.2">

var message="..........Flora de fee zat in haar boomhut in het prachtige bos toen ze opeens een zacht gesnik hoorde. Ze luisterde eens goed, hoorde ze dat nou echt? Spits, de spreeuw, kwam haastig op Flora toegevlogen. Flora, vlug, er is een meisje in nood! Kom vlug helpen! Flora vloog met hem mee en onder een grote berk zat een klein meisje ineengedoken zachtjes te snikken. Hallo kleine meid, waarom huil je? vroeg Flora met haar allerliefste stemmetje. Het meisje keek verschrikt op en wat ze zag kon ze bijna niet geloven. Voor haar hing een prachtige fee in de lucht. De fee had een mooie, lange jurk van zijde aan en ze had goudblonde, lange haren en de allermooiste blauwe ogen die het meisje ooit had gezien. Vertel mij eens precies wat er gebeurd is. Nou, ik was met mama aan het wandelen, toen ik ineens een lief hondje zag lopen, snik.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=170  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
