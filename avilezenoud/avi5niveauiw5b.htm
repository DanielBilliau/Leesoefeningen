<script language="JavaScript1.2">

var message=".......Er was eens een slang die Simon heette. Hij woonde in een groot donker woud. Bij de mensen zijn lekkere hapjes. Maar van zijn moeder mocht hij nooit eens toeslaan. Ze kunnen je vangen en opzetten. Daar hield Simon Slang niet van, dus hij bleef bij de mensen uit de buurt. Maar op een dag, toen hij buiten aan het rond glijden was, zag hij een man die een slang in een kooi had gestopt. Hij droeg hem naar de stad en Simon Slang volgde hem. Hij wilde weten wie die slang was en wat er mee zou gebeuren. Hij volgde de man naar een huis en glipte door een raam naar binnen. Hij hoorde mensen praten. Dood hem en zet hem op. Maar ik kan dat niet! Doe jij dat maar! Bangerd. Maar goed, ik doe het wel. Dat nooit, dacht Simon Slang. Voor dat hij in de gaten had wat er gebeurde sprong hij naar de kooi en beet het slot door. De slang in de kooi heette Sabine.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=190  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
