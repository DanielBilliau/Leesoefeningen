<script language="JavaScript1.2">

var message="..........De volgende ochtend nam vader zijn kinderen mee het bos in. Dieper en dieper en dieper. Voorzichtig liet Klein Duimpje één voor één de kiezelsteentjes op de grond vallen. Plots was vader verdwenen. Klein Duimpje volgde het spoor van de kiezelsteentjes, en na een dag waren de kinderen weer thuis. Gelukkig had zijn vader weer wat geld verdiend, dus was hij blij hen te zien. Maar op een dag was al het geld weer helemaal op. Ook dit keer besloot de vader de kinderen naar het bos te brengen. 's Ochtends kregen de kinderen allemaal nog een homp brood om hun ergste honger te stillen. Klein Duimpje bewaarde wat brood in zijn zak. En hij strooide met broodkruimels een spoor, om de weg weer terug te kunnen vinden. Maar ach, de volgende morgen hadden alle vogels hadden het brood opgegeten. Moedeloos dwaalden de zeven broers door het bos. Tot ze bij een huisje kwamen. Een vrouw deed open.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=170  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()
