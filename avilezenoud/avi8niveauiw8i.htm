<script language="JavaScript1.2">

var message="..........Er was eens een tovenaar die een bijzondere spiegel had gemaakt. Alles wat je in die spiegel zag werd lelijk en misvormd. Op een kwade dag brak de spiegel. De scherfjes en splinters verspreidden zich over de hele wereld. Één van die splinters kwam terecht in het oog van een kleine jongen, Kai. Heel even voelde hij een prikje. Daarna veranderde zijn hele wereld. Zijn buurmeisje Gerda vond hij ineens maar een dom, lelijk meisje. Haar grootmoeder die zulke prachtige verhalen kon vertellen, werd voor hem een stom oud mens met kinderverhaaltjes. De prachtige rozen op hun balkonnetjes veranderden in zijn ogen in lelijke dingen waar je niets aan hebt. Op een koude winterdag toen hij in de sneeuw speelde, landde er een rendierenslee met een prachtige vrouw erin midden op het plein. Het was de sneeuwkoningin die op weg was naar haar ijspaleis.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=170  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
