<script language="JavaScript1.2">

var message="..........Lang geleden leefde er een lelijk meisje. Ze heette Saar. Saar had een lange neus en heel veel wratten. Ze had grijs met rood haar. Iedereen vond dat Saar op een heks leek, want Saar wist ook alles over toverdrankjes. Op een avond toen Saar naar huis ging zag ze iets in de lucht vliegen. Een heks misschien, dacht Saar. Neen dat kan niet. Ik weet het, zei Saar. Het is een kerstman. Gauw liep Saar naar huis. Misschien had de kerstman voor haar een geschenkje gebracht. Ze stak de sleutel door het sleutelgat en liep naar binnen. Saar keek in haar sok. Geen geschenkje onder de bank, tafel, deken, bed. Neen nergens kon Saar een geschenkje vinden. Misschien kan de kerstman straks komen, dacht ze. Saar ging naar bed. De volgende dag keek Saar weer in haar sok, maar er lag weer niks.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=103  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
