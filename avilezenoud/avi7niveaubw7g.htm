<script language="JavaScript1.2">

var message="..........Mormeltje en Dondertje hebben medelijden met de aap. Ze maken een stapel pannenkoeken voor hem klaar. Met stroop, met jam en met suiker. Als hij zijn buikje vol heeft en er geen kruimeltje meer over is, zegt Mormeltje: Zo aap, nu brengen Dondertje en ik je met de bus naar de dierentuin. Drie kaartjes, chauffeur, zegt Mormeltje beleefd. De chauffeur weet niet wat hij ziet. Twee poezen en een aap heeft hij nog nooit in zijn bus gehad. Als de bus stilstaat, springt de aap meteen naar buiten. Bedankt, Mormeltje. en weg is hij. Waar is hij nou? Mormeltje wijst naar de bomen achter het hek. Daar is de aap. Hij slingert van de ene boom naar de andere. Ze kijken hem na tot hij niet meer te zien is. De aap is weer thuis, zegt Mormeltje.Weet je wat wij gaan doen, Dondertje? Dat weet Dondertje wel. Naar huis en pannenkoeken eten met jam en stroop, want daar heb ik al weer trek in.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=103  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
