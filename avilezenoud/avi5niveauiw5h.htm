<script language="JavaScript1.2">

var message=".......De kleine zeemeermin, met haar ogen zo blauw als de diepste zee. De kleine zeemeermin leefde met haar zusjes in de diepe, diepe oceaan. Ze had een heerlijk leven. Toch was ze heel nieuwsgierig naar de mensenwereld boven water. Naar de bloemen en de vogels. Op haar vijftiende verjaardag was het zover. Ze mocht ze voor het eerst naar de schepen kijken. Vlakbij, in het maanlicht lag een groot schip. Elke keer als ze door de golven werd opgetild kon ze door het raam naar binnen kijken. Daar stond een jonge prins met grote zwarte ogen. Wat was hij mooi! En wat keek hij vriendelijk! Plots stak er een felle wind op. De golven botsten tegen het schip. De bemanning was in rep en roer. Het schip kraakte en kreunde. Toen brak het schip in tweeën. Snel bedacht ze, dat mensen niet onder water kunnen zwemmen. Met één slag van haar staart was ze bij hem.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=190  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
