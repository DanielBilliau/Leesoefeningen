<script language="JavaScript1.2">

var message=".......Rik en Leen hebben oude kleren aan. Zo mogen ze naar de zolder. Vlug rennen ze de trap op. Ze steken het licht aan. We moeten eerst opruimen en daarna poetsen. Achter een gele fiets staat een grote kast. Rik trekt de deur open. Komen kijken, Leen, roept hij. De kast ligt vol met rommel. Een wandelstok,... dat wordt een toverstaf. Een trommel, oude spullen van grootvader, kleren, hoeden, een schommelpaard, een doosje met parels... Rik neemt een hoge, zwarte hoed. Hij schrikt! Hij hoort geritsel! Hij verstopt zich achter een kist. Wat was dat, Leen? Een prater met een grote mond ben jij! Dat was een muis, een gewone grijze muis. Bleke Rik krijgt een kleurtje. Dat dier heeft een gat in de hoed gebeten. We moeten ze vangen! Ik weet wat beter! We gaan ons verkleden. Jij bent de rijke prins met de toverstaf. En ik de prinses met een gouden kroontje.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=190  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
