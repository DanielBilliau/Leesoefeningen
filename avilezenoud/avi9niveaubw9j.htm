<script language="JavaScript1.2">

var message="..........Er was eens een man die op het platteland en in de stad mooie huizen bezat. En dat niet alleen: hij had ook nog een heleboel zilver en goud, mooie meubels met borduursel op de zittingen en vergulde koetsen. Maar jammer genoeg had hij een blauwe baard. Dat maakte hem zo lelijk dat alle vrouwen en meisjes wegliepen als hij eraan kwam. Een van zijn buren, een deftige dame, had twee heel mooie dochters. Hij vroeg die mevrouw of hij met een van hen mocht trouwen; het kon hem niet schelen met welke. Maar de twee meisjes wilden dat niet. Want, behalve dat van die baard, was er nog een reden voor hun walging en afschuw: het idee, dat hij al met verschillende vrouwen getrouwd was geweest en dat niemand wist waar die gebleven waren. Om toch nog hun liefde te winnen, nodigde Blauwbaard de meisjes uit om een week in een van zijn buitenhuizen te komen logeren. ";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=103  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
