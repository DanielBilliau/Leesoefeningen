<script language="JavaScript1.2">

var message="..........Papa haalt Boris uit bed. Hij schuift de gordijnen open. ‘Kijk eens naar buiten!’ roept papa. De straat is wit. De auto’s zijn wit. Boris weet niet wat hij ziet. ‘Het heeft vannacht gesneeuwd,’ legt papa uit. ‘Alles is wit van de sneeuw.’ Wanneer het heeft gesneeuwd willen Boris en Katinka met hun vader een sneeuwpop bouwen. Katinka maakt een grote berg van sneeuw. Dat wordt de buik van de sneeuwman. Papa maakt het hoofd van de sneeuwman. Maar plotseling glijdt papa uit en zit hij midden in de sneeuw. Boris en Katinka peperen hun vader in met sneeuw. Papa wordt helemaal wit. Katinka stopt de wortel in papa’s mond en zegt: ‘Nu hebben we een echte sneeuwman!’ Boris en Katinka beleven samen nog meer winterpret. Ze leren schaatsen en gaan sleetje rijden. Samen met hun vader gaan ze kijken naar de boot van Sinterklaas  en natuurlijk genieten ze van het kerstfeest.";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=103  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()
