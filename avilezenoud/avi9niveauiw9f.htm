<script language="JavaScript1.2">

var message="..........De kinderen staarden stomverbaasd naar het stokje terwijl het wiebelde, strekte en in het rond danste, zo blij om vrij te zijn. Verlegen keek het toen naar Rhana en Paul en zei zachtjes: ‘Bedankt.’ Rhana en Paul waren natuurlijk heel verbaasd over wat ze hoorden en zagen. Paul vroeg: ‘Wat - wie - ben jij?’ De kleine vector antwoordde: ‘Ik heb altijd de vorm van een pijl, en mijn moeder heeft mij verteld dat ik op zeekaarten wordt getekend door oceanografen om te laten zien in welke richting de stromingen van de oceanen bewegen, hoe snel ze stromen en hoe koud het water is.’ De vector begon rond te lopen terwijl hij meer over zichzelf vertelde. ‘Mijn grootte hangt af van hoe sterk de stroming is. Als deze heel sterk is, word ik groot, en als de stroming zwak is, word ik klein. Mijn hoofd is een pijl om aan te geven welke richting ik op ga.’ ";//hiervoor je tekst
var neonbasecolor="black"
var neontextcolor="pink"
var flashspeed=170  //in milliseconds

///No need to edit below this line/////

var n=0
if (document.all||document.getElementById){
document.write('<font color="'+neonbasecolor+'">')
for (m=0;m<message.length;m++)
document.write('<span id="neonlight'+m+'">'+message.charAt(m)+'</span>')
document.write('</font>')
}
else
document.write(message)

function crossref(number){
var crossobj=document.all? eval("document.all.neonlight"+number) : document.getElementById("neonlight"+number)
return crossobj
}

function neon(){

//Change all letters to base color
if (n==0){
for (m=0;m<message.length;m++)
//eval("document.all.neonlight"+m).style.color=neonbasecolor
crossref(m).style.color=neonbasecolor
}

//cycle through and change individual letters to neon color
crossref(n).style.color=neontextcolor

if (n<message.length-1)
n++
else{
n=0
clearInterval(flashing)
setTimeout("beginneon()",1500)
return
}
}

function beginneon(){
if (document.all||document.getElementById)
flashing=setInterval("neon()",flashspeed)
}
beginneon()


</script>
